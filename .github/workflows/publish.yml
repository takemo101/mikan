name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches CLI package version
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "Tag v$tag_version does not match CLI version $version"
            exit 1
          fi

      - name: Check npm publish state
        id: publish-state
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          package="@takemo101/mikan@$version"
          if npm view "$package" version >/dev/null 2>&1; then
            echo "$package is already published; skipping."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "$package is not published yet."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        if: steps.publish-state.outputs.published != 'true'
        # actions/setup-node bundles whatever npm ships with the requested
        # Node.js version, which can lag behind. npm Trusted Publishing
        # authenticated via GitHub Actions OIDC needs npm >= 11.5.1.
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Setup Bun
        if: steps.publish-state.outputs.published != 'true'
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        if: steps.publish-state.outputs.published != 'true'
        run: bun install --frozen-lockfile

      - name: Run checks and build dist
        if: steps.publish-state.outputs.published != 'true'
        run: |
          bun run typecheck
          bun run test
          bun run check
          bun run build

      - name: Verify publish package contents
        if: steps.publish-state.outputs.published != 'true'
        run: |
          test -f packages/cli/dist/bin.js || {
            echo "dist/bin.js not found"
            exit 1
          }
          test -f packages/cli/README.md || {
            echo "packages/cli/README.md not found"
            exit 1
          }
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const cliPackage = require('./packages/cli/package.json');
          const platform = process.platform;
          const arch = process.arch;
          const nativePackage = `@opentui/core-${platform}-${arch}`;
          const expected = '0.3.0';
          if (cliPackage.optionalDependencies?.[nativePackage] !== expected) {
            throw new Error(`Missing ${nativePackage}@${expected}`);
          }
          const pack = execFileSync(
            'npm',
            ['pack', '--dry-run', '--json', './packages/cli'],
            { encoding: 'utf8' },
          );
          const [packed] = JSON.parse(pack);
          const files = new Set(packed.files.map((file) => file.path));
          const requiredFiles = ['dist/bin.js', 'README.md', 'package.json'];
          for (const required of requiredFiles) {
            if (!files.has(required)) throw new Error(`Missing ${required}`);
          }
          if (files.has('src/bin.ts')) throw new Error('Source leaked');
          console.log(`Verified ${packed.name}@${packed.version}`);
          NODE

      - name: Verify installed package can load native OpenTUI package
        if: steps.publish-state.outputs.published != 'true'
        run: |
          tmpdir="$(mktemp -d)"
          npm pack ./packages/cli --pack-destination "$tmpdir"
          tarball="$(find "$tmpdir" -name '*.tgz' -print -quit)"
          cd "$tmpdir"
          npm install "$tarball"
          bun - <<'BUN'
          const native = `@opentui/core-${process.platform}-${process.arch}`;
          await import(native);
          console.log(`loaded ${native}`);
          BUN
          ./node_modules/.bin/mikan --help

      - name: Publish to npm with Trusted Publishing
        if: steps.publish-state.outputs.published != 'true'
        run: |
          cd packages/cli
          npm publish --provenance --access public
